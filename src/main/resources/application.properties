# Application Configuration
spring.application.name=digital-therapy-assistant
server.port=8080

# H2 Database Configuration
#spring.datasource.url=jdbc:h2:file:./data/digitaltherapy_db;AUTO_SERVER=TRUE
#temp change for dev
spring.datasource.url=jdbc:h2:mem:testdb


spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
#changed update to none
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SQL Init
spring.sql.init.mode=always

app.cli.enabled=true

# Spring AI - Vector Store Persistence
spring.ai.vectorstore.simple.store.path=./data/vector-store.json

# Spring AI - Anthropic Configuration
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-20250514
spring.ai.anthropic.chat.options.max-tokens=1024
spring.ai.anthropic.chat.options.temperature=0.7

# CLI API Client Configuration
cli.api.base-url=http://localhost:${server.port:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-digital-therapy-app-replace-in-production}
jwt.expiration=3600000
jwt.refresh-expiration=86400000

# Logging Configuration
logging.level.com.digitaltherapy=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

# Internal API calls (incoming HTTP requests/responses)
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
